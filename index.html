<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Plan Out — Asistente</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #111b21;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 0;
}

.phone-wrap {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  max-height: 780px;
  display: flex;
  flex-direction: column;
  background: #0b141a;
  position: relative;
  overflow: hidden;
}

/* Header */
.wa-header {
  background: #202c33;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #2a3942;
}

.wa-back {
  color: #aebac1;
  font-size: 20px;
  cursor: pointer;
}

.wa-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00a884, #007a62);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.wa-header-info {
  flex: 1;
}

.wa-header-info h2 {
  font-size: 16px;
  font-weight: 600;
  color: #e9edef;
  letter-spacing: -0.01em;
}

.wa-header-info p {
  font-size: 12px;
  color: #8696a0;
  margin-top: 1px;
}

.wa-header-actions {
  display: flex;
  gap: 20px;
  color: #aebac1;
  font-size: 18px;
}

/* Background pattern */
.wa-bg {
  position: absolute;
  inset: 60px 0 60px 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.8'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

/* Messages */
.wa-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

.wa-messages::-webkit-scrollbar { width: 3px; }
.wa-messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 2px; }

.date-separator {
  text-align: center;
  margin: 8px 0;
}

.date-separator span {
  background: #182229;
  color: #8696a0;
  font-size: 11.5px;
  padding: 4px 12px;
  border-radius: 8px;
}

.wa-msg {
  display: flex;
  flex-direction: column;
  max-width: 75%;
  animation: msgIn 0.15s ease;
  margin-bottom: 2px;
}

@keyframes msgIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.wa-msg.bot { align-self: flex-start; }
.wa-msg.user { align-self: flex-end; }

.wa-bubble {
  padding: 7px 10px 6px;
  border-radius: 8px;
  font-size: 14.2px;
  line-height: 1.45;
  position: relative;
  word-wrap: break-word;
}

.bot .wa-bubble {
  background: #202c33;
  color: #e9edef;
  border-top-left-radius: 2px;
}

.user .wa-bubble {
  background: #005c4b;
  color: #e9edef;
  border-top-right-radius: 2px;
}

.wa-meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  margin-top: 3px;
}

.wa-time {
  font-size: 11px;
  color: #8696a0;
}

.user .wa-time { color: #8696a0; }

.wa-tick { font-size: 12px; color: #53bdeb; }

/* Typing indicator */
.typing-bubble {
  background: #202c33;
  border-radius: 8px;
  border-top-left-radius: 2px;
  padding: 12px 14px;
  align-self: flex-start;
  animation: msgIn 0.15s ease;
}

.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}

.typing-dots span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #8696a0;
  animation: typingBounce 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input */
.wa-input-area {
  background: #202c33;
  padding: 8px 12px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
  z-index: 1;
}

.wa-input-wrap {
  flex: 1;
  background: #2a3942;
  border-radius: 24px;
  padding: 9px 16px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

.wa-emoji { color: #8696a0; font-size: 22px; cursor: pointer; flex-shrink: 0; margin-bottom: 1px; }

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e9edef;
  font-family: 'Inter', sans-serif;
  font-size: 14.5px;
  resize: none;
  max-height: 100px;
  line-height: 1.4;
}

textarea::placeholder { color: #8696a0; }

.wa-attach { color: #8696a0; font-size: 22px; cursor: pointer; flex-shrink: 0; margin-bottom: 1px; }

.wa-send {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #00a884;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

.wa-send:hover { background: #00c49a; }
.wa-send:disabled { background: #374045; cursor: not-allowed; }
.wa-send svg { fill: white; }

/* Suggestions */
.suggestions {
  padding: 6px 12px 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  z-index: 1;
  background: #0b141a;
}

.chip {
  font-size: 12.5px;
  padding: 5px 12px;
  border-radius: 16px;
  background: #182229;
  border: 1px solid #2a3942;
  color: #8696a0;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip:hover { background: #2a3942; color: #e9edef; }
</style>
</head>
<body>
<div class="phone-wrap">

  <!-- Header -->
  <div class="wa-header">
    <div class="wa-back">‹</div>
    <div class="wa-avatar">🎫</div>
    <div class="wa-header-info">
      <h2>Plan Out</h2>
      <p id="statusText">en línea</p>
    </div>
    <div class="wa-header-actions">
      <span>📹</span>
      <span>📞</span>
      <span>⋮</span>
    </div>
  </div>

  <div class="wa-bg"></div>

  <!-- Messages -->
  <div class="wa-messages" id="messages">
    <div class="date-separator"><span>HOY</span></div>
    <div class="wa-msg bot">
      <div class="wa-bubble">Hola! Soy el asistente de Plan Out para productores. Contame en qué te puedo ayudar.</div>
      <div class="wa-meta"><span class="wa-time" id="initTime"></span></div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="enviarChip(this)">Como creo un evento?</div>
    <div class="chip" onclick="enviarChip(this)">Como envio cortesias masivas?</div>
    <div class="chip" onclick="enviarChip(this)">Como configuro precios?</div>
  </div>

  <!-- Input -->
  <div class="wa-input-area">
    <div class="wa-input-wrap">
      <span class="wa-emoji">😊</span>
      <textarea id="inputMsg" placeholder="Mensaje" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <span class="wa-attach">📎</span>
    </div>
    <button class="wa-send" id="sendBtn" onclick="enviar()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://riebslbcwfkobooetoxd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_lgDG4KVa07WR9lVaM-BdPA_nlT_JWQv";


let historial = [];

function hora() {
  return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

window.onload = () => {
  document.getElementById("initTime").textContent = hora();
};

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

function enviarChip(el) {
  document.getElementById("inputMsg").value = el.textContent;
  document.getElementById("suggestions").style.display = "none";
  enviar();
}

function agregarMensaje(rol, texto) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `wa-msg ${rol === "user" ? "user" : "bot"}`;
  const tick = rol === "user" ? '<span class="wa-tick">✓✓</span>' : '';
  div.innerHTML = `
    <div class="wa-bubble">${texto.replace(/\n/g, "<br>")}</div>
    <div class="wa-meta"><span class="wa-time">${hora()}</span>${tick}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function mostrarTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "typing-bubble";
  div.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById("statusText").textContent = "escribiendo...";
}

function quitarTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
  document.getElementById("statusText").textContent = "en línea";
}



async function enviar() {
  const input = document.getElementById("inputMsg");
  const texto = input.value.trim();
  if (!texto) return;

  input.value = "";
  input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("suggestions").style.display = "none";

  agregarMensaje("user", texto);
  historial.push({ role: "user", content: texto });
  mostrarTyping();

  try {
    const contexto = await buscarContexto(texto);

    const systemPrompt = `Sos el asistente virtual de Plan Out para productores de eventos. Estás para ayudarlos a operar la plataforma de gestión de entradas.
Escribís como un argentino: sin signos de apertura (¡ ¿), con voseo natural, tono directo y cercano pero profesional. Sin emojis.
Tus respuestas no superan los 4 o 5 renglones. Si el tema necesita más desarrollo, lo dividís en partes y preguntás si quiere seguir.
Cuando expliques pasos, usás listas cortas — máximo 4 o 5 ítems por vez.
Si no tenés certeza sobre algo, no inventás. Le decís que lo vas a derivar con el equipo de soporte de Plan Out.

INFORMACIÓN DISPONIBLE:
${contexto}`;

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o",
        max_tokens: 300,
        messages: [
          { role: "system", content: systemPrompt },
          ...historial
        ]
      })
    });

    const data = await response.json();
    quitarTyping();

    if (data.choices && data.choices[0]) {
      const respuesta = data.choices[0].message.content;
      historial.push({ role: "assistant", content: respuesta });
      agregarMensaje("assistant", respuesta);
    } else {
      throw new Error(data.error?.message || "Sin respuesta");
    }

  } catch (err) {
    quitarTyping();
    agregarMensaje("assistant", "Tuve un problema para procesar tu consulta. Intentalo de nuevo en un momento.");
    console.error(err);
  }

  document.getElementById("sendBtn").disabled = false;
}
</script>
</body>
</html>
